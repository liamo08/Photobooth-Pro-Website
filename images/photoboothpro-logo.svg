<svg viewBox="0 0 48 48" width="512" height="512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Camera body -->
  <rect x="4" y="14" width="40" height="26" rx="4" fill="url(#logo-grad)" />
  <!-- Viewfinder bump -->
  <rect x="16" y="8" width="12" height="8" rx="2" fill="url(#logo-grad)" />
  <!-- Lens outer ring -->
  <circle cx="24" cy="27" r="10" fill="#0f172a" />
  <circle cx="24" cy="27" r="9" fill="none" stroke="url(#lens-grad)" stroke-width="1.5" />
  <!-- Aperture blades -->
  <path d="M24 18 L27 24 L24 22 Z" fill="url(#lens-grad)" opacity="0.6" />
  <path d="M32.5 22 L28 25.5 L29 23 Z" fill="url(#lens-grad)" opacity="0.5" />
  <path d="M32.5 32 L27.5 27 L29.5 27.5 Z" fill="url(#lens-grad)" opacity="0.4" />
  <path d="M24 36 L21 30 L24 32 Z" fill="url(#lens-grad)" opacity="0.6" />
  <path d="M15.5 32 L20 28.5 L18.5 31 Z" fill="url(#lens-grad)" opacity="0.5" />
  <path d="M15.5 22 L20.5 27 L18 26.5 Z" fill="url(#lens-grad)" opacity="0.4" />
  <!-- Lens center -->
  <circle cx="24" cy="27" r="4" fill="url(#center-grad)" />
  <circle cx="22.5" cy="25.5" r="1.2" fill="rgba(255,255,255,0.4)" />
  <!-- Flash -->
  <circle cx="37" cy="17" r="2" fill="#facc15" opacity="0.8" />
  <defs>
    <linearGradient id="logo-grad" x1="0" y1="0" x2="48" y2="48">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
    <linearGradient id="lens-grad" x1="14" y1="17" x2="34" y2="37">
      <stop offset="0%" stop-color="#818cf8" />
      <stop offset="100%" stop-color="#60a5fa" />
    </linearGradient>
    <radialGradient id="center-grad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1e1b4b" />
      <stop offset="100%" stop-color="#0f172a" />
    </radialGradient>
  </defs>
